<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ooru Logix - Agent Orchestration Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #0B2648;
            --chai: #8B6F47;
            --green: #2DB76F;
            --cyan: #00FFFF;
            --purple: #BD00FF;
            --dark-bg: #0a0e27;
            --card-bg: rgba(11, 38, 72, 0.4);
            --border: rgba(0, 255, 255, 0.1);
            --text-primary: #e0e8ff;
            --text-secondary: #a0aec0;
            --text-muted: #718096;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            background: rgba(11, 38, 72, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--cyan), var(--purple), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 8s ease infinite;
            letter-spacing: -0.5px;
        }

        @keyframes gradient-shift {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(20deg); }
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(45, 183, 111, 0.4); }
            50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(45, 183, 111, 0); }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .clock {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            color: var(--cyan);
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            background: rgba(11, 38, 72, 0.2);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .nav-tab {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .nav-tab:hover {
            color: var(--text-primary);
            border-color: var(--cyan);
        }

        .nav-tab.active {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(189, 0, 255, 0.1));
            border-color: var(--cyan);
            color: var(--cyan);
        }

        /* View containers */
        .view {
            display: none;
        }

        .view.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Agent Grid View */
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .dept-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .dept-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--cyan), var(--purple), var(--green));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .dept-card:hover {
            border-color: var(--cyan);
            transform: translateY(-5px);
        }

        .dept-card:hover::before {
            opacity: 1;
        }

        .dept-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .dept-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .dept-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .dept-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat {
            background: rgba(0, 255, 255, 0.05);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(0, 255, 255, 0.1);
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .dept-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--green);
        }

        .expand-icon {
            transition: transform 0.3s ease;
        }

        .dept-card.expanded .expand-icon {
            transform: rotate(180deg);
        }

        /* Expanded Agent List */
        .agent-list {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .agent-list.visible {
            display: block;
        }

        .agent-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 3px solid var(--cyan);
            font-size: 13px;
        }

        .agent-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .agent-role {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 6px;
        }

        .agent-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(45, 183, 111, 0.2);
            color: var(--green);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Skill Catalog View */
        .skill-search {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            background: rgba(11, 38, 72, 0.4);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--cyan);
        }

        .filter-select {
            padding: 12px 16px;
            background: rgba(11, 38, 72, 0.4);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--cyan);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .skill-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .skill-card:hover {
            border-color: var(--cyan);
            transform: translateY(-3px);
        }

        .skill-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .skill-dept {
            font-size: 12px;
            color: var(--chai);
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
        }

        .skill-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .skill-io {
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* MCP Connections View */
        .mcp-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .mcp-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            position: relative;
        }

        .mcp-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .mcp-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .mcp-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
        }

        .status-connected {
            background: rgba(45, 183, 111, 0.2);
            color: var(--green);
        }

        .status-planned {
            background: rgba(189, 0, 255, 0.2);
            color: var(--purple);
        }

        .status-disconnected {
            background: rgba(200, 100, 100, 0.2);
            color: #ff6b6b;
        }

        .mcp-info {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .mcp-agents {
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .mcp-ping {
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--cyan);
        }

        /* Workflow Timeline View */
        .timeline-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .timeline-btn {
            padding: 10px 20px;
            background: rgba(11, 38, 72, 0.4);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .timeline-btn.active {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(189, 0, 255, 0.1));
            border-color: var(--cyan);
            color: var(--cyan);
        }

        .timeline {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
        }

        .time-slots {
            display: grid;
            grid-template-columns: repeat(24, 1fr);
            gap: 8px;
            min-width: 1200px;
        }

        .time-label {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            grid-column: span 1;
            margin-bottom: 10px;
        }

        .workflow-block {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(189, 0, 255, 0.2));
            border: 1px solid var(--cyan);
            border-radius: 4px;
            padding: 8px;
            font-size: 11px;
            font-weight: 600;
            color: var(--cyan);
            text-align: center;
            grid-column: span 2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.3s ease;
        }

        .workflow-block:hover {
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .dept-color-sales { border-color: #ff6b6b; background: linear-gradient(135deg, rgba(255, 107, 107, 0.2), rgba(255, 107, 107, 0.1)); }
        .dept-color-marketing { border-color: #ffa726; background: linear-gradient(135deg, rgba(255, 167, 38, 0.2), rgba(255, 167, 38, 0.1)); }
        .dept-color-engineering { border-color: #42a5f5; background: linear-gradient(135deg, rgba(66, 165, 245, 0.2), rgba(66, 165, 245, 0.1)); }
        .dept-color-finance { border-color: #ab47bc; background: linear-gradient(135deg, rgba(171, 71, 188, 0.2), rgba(171, 71, 188, 0.1)); }
        .dept-color-webdev { border-color: var(--green); background: linear-gradient(135deg, rgba(45, 183, 111, 0.2), rgba(45, 183, 111, 0.1)); }
        .dept-color-success { border-color: var(--chai); background: linear-gradient(135deg, rgba(139, 111, 71, 0.2), rgba(139, 111, 71, 0.1)); }

        /* Metrics Dashboard View */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
        }

        .metric-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 8px;
        }

        .metric-sparkline {
            width: 100%;
            height: 30px;
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(0, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--purple));
            transition: width 0.5s ease;
        }

        /* Activity Log */
        .activity-log {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        .activity-log-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .activity-item {
            display: flex;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-time {
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            min-width: 60px;
        }

        .activity-desc {
            color: var(--text-secondary);
            flex: 1;
        }

        .activity-agent {
            color: var(--cyan);
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .agent-grid {
                grid-template-columns: 1fr;
            }

            .nav-tabs {
                width: 100%;
                overflow-x: auto;
            }

            .time-slots {
                grid-template-columns: repeat(12, 1fr);
                min-width: 600px;
            }

            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .logo {
                font-size: 24px;
            }
        }

        /* Scroll styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 255, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>

        <!-- Navigation Tabs -->

            <div class="skills-grid" id="skills-grid"></div>

        <!-- MCP Connections View -->
        <div id="mcp" class="view">

        </div>

        <!-- Workflow Timeline View -->
        <div id="workflow" class="view">
            <div class="timeline-controls">
                <button class="timeline-btn active" data-timeline="daily">Daily View</button>
                <button class="timeline-btn" data-timeline="weekly">Weekly View</button>

            <div class="timeline">
                <div id="timeline-container"></div>
            </div>
        </div>

        <!-- Metrics Dashboard View -->
        <div id="metrics" class="view">
            <div class="metrics-grid" id="metrics-grid"></div>
            <div class="activity-log">
                <div class="activity-log-title">Recent Agent Activity</div>
                <div id="activity-log"></div>
            </div>
        </div>
    </div>

        // Render Workflow Timeline
        function renderTimeline(type = 'daily') {
            const container = document.getElementById('timeline-container');
            const workflowList = workflows[type];
            let html = '<div class="time-slots">';

            if (type === 'daily') {
                // Time labels
                for (let i = 0; i < 24; i++) {
                    html += `<div class="time-label">${String(i).padStart(2, '0')}h</div>`;
                }

                // Workflow blocks
                workflowList.forEach(wf => {
                    const deptClass = `dept-color-${wf.dept.toLowerCase().replace(/\s+/g, '').replace('/', '')}`;
                    html += `<div class="workflow-block ${deptClass}" style="grid-column: span 2;">${wf.name}</div>`;
                });
            } else {
                // Weekly view
                const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
                html = '<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px;">';

                days.forEach(day => {
                    const dayWorkflows = workflowList.filter(w => w.day && w.day.includes(day));
                    const deptClass = dayWorkflows.length > 0 ? `dept-color-${dayWorkflows[0].dept.toLowerCase().replace(/\s+/g, '').replace('/', '')}` : 'dept-color-sales';
                    html += `
                        <div style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 15px; text-align: center;">
                            <div style="font-weight: 600; margin-bottom: 10px;">${day}</div>
                            ${dayWorkflows.map(w => `
                                <div class="workflow-block ${deptClass}" style="grid-column: auto; margin-bottom: 8px; display: block;">${w.name}</div>
                            `).join('')}
                            ${dayWorkflows.length === 0 ? '<div style="color: var(--text-muted); font-size: 12px;">No workflows</div>' : ''}
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
                return;
            }

            html += '</div>';
            container.innerHTML = html;
        }
